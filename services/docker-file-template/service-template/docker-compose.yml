services:
  backend:
    image: ${SERVICE_IMAGE:-app-service:latest}
    build:
      context: ..
      dockerfile: ./${SERVICE_DIR:-service-template}/Dockerfile-backend
      args:
        SERVICE_DIR: ${SERVICE_DIR:-service-template}
        APP_PORT: ${APP_PORT:-8080}
    container_name: ${SERVICE_CONTAINER_NAME:-app-service}
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-app_db}?useSSL=true&useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&rewriteBatchedStatements=true
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USERNAME:-root}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-change-me}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_DATABASE: ${REDIS_DATABASE:-0}
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD:-change-me}
    ports:
      - "${HOST_PORT:-8080}:${APP_PORT:-8080}"
    networks:
      - app-network
    restart: unless-stopped

networks:
  app-network:
    external: true
    name: ${APP_NETWORK:-app-network}
